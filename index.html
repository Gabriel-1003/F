<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Dia das Mães</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffeef8 0%, #ffe0f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
        }

        .card {
            background: white;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.3);
            text-align: center;
            max-width: 600px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '🌸';
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 40px;
        }

        .card::after {
            content: '🌺';
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 40px;
        }

        h1 {
            color: #ff69b4;
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: pulse 2s infinite;
        }

        .hearts {
            font-size: 2em;
            margin: 20px 0;
            animation: float 3s ease-in-out infinite;
        }

        .message {
            color: #ff1493;
            font-size: 1.3em;
            line-height: 1.6;
            margin: 30px 0;
            font-style: italic;
        }

        .flowers {
            font-size: 3em;
            margin: 20px 0;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .btn {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="flowers">🌹 🌸 🌺 💐 🌷</div>
        <h1>Feliz Dia das Mães</h1>
        <div class="hearts">💖 💕 💗  💖</div>
        <p class="message">
            "Mãe, você é o amor mais puro e verdadeiro.<br>
            Obrigado por tudo que você faz por mim.<br>
            Te amo infinitamente! 💝"
        </p>
        <button class="btn" onclick="alert('Te amo, mãe! 💕')">Clique aqui</button>
    </div>
</body>
</html>
