<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Dia das Mães</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffeef8 0%, #ffd6e7 50%, #ffb3d9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            overflow: hidden;
            cursor: pointer;
        }

        .click-hint {
            text-align: center;
            animation: pulse 2s infinite;
        }

        .click-hint h2 {
            color: #ff69b4;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .click-hint .hand {
            font-size: 4em;
            animation: bounce 1s infinite;
        }

        .message-container {
            display: none;
            text-align: center;
            z-index: 10;
        }

        .message-container.show {
            display: block;
            animation: fadeIn 1s ease-in;
        }

        .message-container h1 {
            color: #ff1493;
            font-size: 4.5em;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            animation: slideDown 1s ease-out;
        }

        .hearts-container {
            font-size: 3em;
            margin: 20px 0;
            animation: float 3s ease-in-out infinite;
        }

        .flowers {
            font-size: 4em;
            margin: 20px 0;
        }

        .love-message {
            color: #ff69b4;
            font-size: 1.8em;
            font-style: italic;
            margin-top: 30px;
            line-height: 1.6;
            animation: fadeIn 2s ease-in;
        }

        .heart {
            position: absolute;
            font-size: 2em;
            pointer-events: none;
            animation: fall linear;
        }

        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border: 3px solid #ff69b4;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 1.8em;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
            transition: all 0.3s;
            z-index: 100;
            animation: rotate 3s linear infinite;
        }

        .music-control.show {
            display: flex;
        }

        .music-control.paused {
            animation-play-state: paused;
            opacity: 0.6;
        }

        .music-control:hover {
            transform: scale(1.1);
            background: #ff69b4;
            color: white;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from { 
                opacity: 0;
                transform: translateY(-50px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .restart {
            margin-top: 40px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.2em;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
            transition: transform 0.3s;
        }

        .restart:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <!-- Elemento de áudio -->
    <audio id="backgroundMusic" loop>
        <!-- Substitua pelo seu arquivo de música -->
        <source src="musica-dia-das-maes.mp3" type="audio/mpeg">
        <!-- Músicas gratuitas que você pode usar: -->
        <!-- Baixe de: https://www.bensound.com/ ou https://freemusicarchive.org/ -->
    </audio>

    <button class="music-control" id="musicControl" onclick="toggleMusic(event)">🎵</button>

    <div class="click-hint" id="clickHint">
        <div class="hand">👆</div>
        <h2>Clique em qualquer lugar da tela!</h2>
        <p style="color: #ff69b4; font-size: 1.2em;">✨ Uma surpresa especial te espera ✨</p>
        <p style="color: #ff69b4; margin-top: 10px; font-size: 0.9em;">🎵 Com música especial 🎵</p>
    </div>

    <div class="message-container" id="messageContainer">
        <div class="flowers">🌹 🌸 🌺 💐 🌷</div>
        <h1>Feliz Dia das Mães</h1>
        <div class="hearts-container">💖 💕 💗 💖 💕 💗</div>
        <p class="love-message">
            "Mãe, você é o amor mais puro e verdadeiro.<br>
            Obrigado por todo carinho e dedicação.<br>
            Te amo infinitamente! 💝"
        </p>
        <button class="restart" onclick="restart(event)">Clique novamente ❤️</button>
    </div>

    <script>
        let clicked = false;
        let musicPlaying = false;
        const music = document.getElementById('backgroundMusic');
        const musicControl = document.getElementById('musicControl');

        // Ajuste o volume (0.0 a 1.0)
        music.volume = 0.5;

        document.body.addEventListener('click', function(e) {
            if (e.target.classList.contains('restart') || e.target.classList.contains('music-control')) return;
            
            if (!clicked) {
                showMessage();
                // Toca a música no primeiro clique (necessário para browsers)
                playMusic();
            }
            createHeart(e.clientX, e.clientY);
        });

        function playMusic() {
            music.play().then(() => {
                musicPlaying = true;
                musicControl.classList.add('show');
            }).catch(error => {
                console.log('Autoplay prevenido pelo navegador. Usuário precisa interagir primeiro.');
            });
        }

        function toggleMusic(e) {
            e.stopPropagation();
            if (musicPlaying) {
                music.pause();
                musicControl.classList.add('paused');
                musicControl.innerHTML = '🔇';
            } else {
                music.play();
                musicControl.classList.remove('paused');
                musicControl.innerHTML = '🎵';
            }
            musicPlaying = !musicPlaying;
        }

        function showMessage() {
            clicked = true;
            document.getElementById('clickHint').style.display = 'none';
            document.getElementById('messageContainer').classList.add('show');
            musicControl.classList.add('show');
            
            // Criar corações caindo
            setInterval(() => {
                const x = Math.random() * window.innerWidth;
                createHeart(x, -50);
            }, 300);
        }

        function createHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['💖', '💕', '💗', '💝', '🌸', '🌹'][Math.floor(Math.random() * 6)];
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
            document.body.appendChild(heart);
            
            setTimeout(() => heart.remove(), 4000);
        }

        function restart(e) {
            e.stopPropagation();
            clicked = false;
            document.getElementById('messageContainer').classList.remove('show');
            document.getElementById('clickHint').style.display = 'block';
            musicControl.classList.remove('show');
            
            // Parar música
            if (musicPlaying) {
                music.pause();
                music.currentTime = 0;
                musicPlaying = false;
            }
            
            // Remover todos os corações
            document.querySelectorAll('.heart').forEach(h => h.remove());
        }

        // Suporte para touch em dispositivos móveis
        document.body.addEventListener('touchstart', function(e) {
            if (e.target.classList.contains('restart') || e.target.classList.contains('music-control')) return;
            
            const touch = e.touches[0];
            if (!clicked) {
                showMessage();
                playMusic();
            }
            createHeart(touch.clientX, touch.clientY);
        });
    </script>
</body>
</html>
